<!DOCTYPE html>
<html>
    <head>
        <title>Happy Birthday Sallu</title>
        <style>
            body{
                background: linear-gradient(to right, pink, red);
                text-align: center;
                font-family: Arial, sans-serif;
                padding-top: 10px;
                overflow: hidden;
            }
            h1{
                color: red;
                font-size: 50px;
            }
            p, h3{
                color: black;
            }
            .heart{
                position: absolute;
                font-size: 30px;
                animation: float 6s linear infinite;
            }
            @keyframes float{
                from{
                    transform: translateY(-100px);
                }
            }
        </style>
    </head>
    <body>
        <!--Floating Hearts-->
        <div class="heart" style="left:10%;">💖</div>
        <div class="heart" style="left:25%;animation-delay:1s;">💕</div>
        <div class="heart" style="left:40%;animation-delay:2s;">💗</div>
        <div class="heart" style="left:60%;animation-delay:3s;">💘</div>
        <div class="heart" style="left:75%;animation-delay:4s;">💞</div>
        <div class="heart" style="left:90%;animation-delay:5s;">❤️</div>
        <div class="heart" style="left:85%;animation-delay:4s;">💝</div>
        <img src="salluu.jpeg"
             width="250"
             height="250"
             style="border-radius:50%;
                    border:5px solid white;">
                    <p style="color:black; font-size:22px;">The reason behind many smiles 💗✨
                    </p>
                    <h1>
                        Happy Birthday Sallu 🎀💗✨
                    </h1>
                    <p style="font-size:25px;">May your day be filled with happiness, laughter and love 💖</p>
                    <p style=font-size:30px;">💗🌹😇🎂🎁🔐💗</p>
                    <h3>From a computer student with lots of love 💻💗</h3>


    </body>
</html>
